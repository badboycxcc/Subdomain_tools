name: Build Multi Arch

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - runner: macos-13
            goos: darwin
            goarch: amd64
            ext: ""
          - runner: macos-14
            goos: darwin
            goarch: arm64
            ext: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux Build Dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          out="build/subdomain-tools-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 go build -o "${out}" ./cmd/subdomain-tools
          ls -lh "${out}"

      - name: Generate SHA1
        shell: bash
        run: |
          set -euo pipefail
          file="subdomain-tools-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          cd build
          if command -v sha1sum >/dev/null 2>&1; then
            sha1sum "${file}" > "${file}.sha1"
          else
            shasum -a 1 "${file}" > "${file}.sha1"
          fi
          cat "${file}.sha1"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: subdomain-tools-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            build/subdomain-tools-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            build/subdomain-tools-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha1
          if-no-files-found: error
